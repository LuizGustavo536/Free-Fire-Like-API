# .github/workflows/update_tokens.yml
name: Update Tokens

on:
  schedule:
    - cron: '0 */7 * * *'  # Executa a cada 7 horas
  workflow_dispatch:  # Permite execução manual

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permissão necessária para fazer push das alterações
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run token update script
        run: python update_tokens.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add tokens.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update tokens [automated]" && git push)
